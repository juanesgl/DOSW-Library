spring:
  application:
    name: DOSW-Library
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dosw_library}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
