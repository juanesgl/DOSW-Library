spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:mongo}
  application:
    name: DOSW-Library

  #Config PostgreSQL
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dosw_library}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # 2. Config MongoDB (NoSQL)
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:${MONGO_URI}}
      database: dosw_library

# Config server and SSL
server:
  port: ${PORT:80}
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEYSTORE_PATH:}
    key-store-password: ${SSL_KEYSTORE_PASSWORD:}
    key-store-type: PKCS12
    key-alias: dosw-library

# JWT Configuration
jwt:
  secret: ${JWT_SECRET_KEY}
  expiration: 86400000