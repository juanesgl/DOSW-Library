services:
  db:
    image: postgres:15-alpine
    container_name: library_db_container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: dosw_library
    ports:
      - "5432:5432"
    volumes:
      - postgres_storage:/var/lib/postgresql/data

volumes:
  postgres_storage: